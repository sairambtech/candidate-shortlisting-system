<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiter Dashboard</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h2>Recruiter Dashboard</h2>
      <button onclick="logout()">Logout</button>
    </div>

    <h3>Add Candidate</h3>
    <form id="candidateForm">
      <input type="text" id="name" placeholder="Candidate name" required />
      <input type="email" id="email" placeholder="Candidate email" required />
      <input type="text" id="phone" placeholder="Phone number" required />
      <input type="text" id="skills" placeholder="Skills comma separated" />
      <input type="number" id="experience" placeholder="Experience in years" />
      <button type="submit">Add Candidate</button>
    </form>

    <p class="message" id="message"></p>

    <h3>Candidate List</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Skills</th>
          <th>Experience</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="candidateTableBody"></tbody>
    </table>
  </div>

  <script src="./js/recruiter.js"></script>
</body>
</html>
